name: Daily market board update

on:
  schedule:
    # 21:30 UTC = 4:30pm ET (market close), Mon-Fri. Adjust for your timezone / DST as needed.
    - cron: "30 21 * * 1-5"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: python fetch_data.py

      - name: Commit data.json
        run: |
          git config user.name "board-bot"
          git config user.email "actions@github.com"
          git add data.json
          git diff --quiet --cached || git commit -m "Daily data update"
          git push
